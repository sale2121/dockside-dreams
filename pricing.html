<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="keywords" content="sailing, boat, skipper, yacht, memories, rental" />
    <meta name="language" content="english"/>
    <meta name="description" content="
    Experience the ultimate boating destination at our premier yacht rental agency. Step into a world of adventure, where our dedicated community of sailing enthusiasts comes together to elevate their maritime experiences. With our fleet of state-of-the-art boats, expert captains, and personalized sailing excursions, we provide the perfect environment for you to explore the seas, challenge your sailing skills, and create unforgettable memories. Join us today and embark on a transformative boating journey designed exclusively for adventurers. Together, we'll redefine what it means to sail with strength, confidence, and boundless exploration."/>
    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300&display=swap" rel="stylesheet"/>
    <!-- icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"/>
    <!-- bootstrap  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous"/>
    <!-- css -->
    <link rel="stylesheet" href="assets/css/style.css"/>
    <title>Dockside Dreams</title>
</head>
<body>
 
    <!-- header  -->
      
    <!-- cover img  -->
  

    <!-- middle quote  -->
    <div id="middle-quote"></div>

    <div class="container-fluid">
            <div class="row justify-content-between navbar navbar-dark">
                <div class="col-12 justify-content-center d-flex" id="center" >
                    <form class="form-inline mx-auto" id="search">
                        <div class="input-group rounded">
                          <input type="search" id="inputSearch" class="mx-auto form-control rounded" placeholder="Search" aria-label="Search">
                          <div class="input-group-append flex-grow-0">
                            <button class="btn btn-outline-secondary btnSearch"><i class="fas fa-search"></i></button>
                          </div>
                        </div>
                      </form>                      
                </div>
                <div class="col-lg-2 col-6 cart text-white d-flex justify-content-end position-relative">
                    
                </div>
            </div>
    </div>
    
    <div class="container mb-4">
        <div class="row mb-5">
            <div class="col-lg-4 col-sm-6 mt-3">
                <select class="form-select px-2 py-3 w-100 filters" id="categoryFilter">
                    <option value="0">category</option>
                    <option value="yacht">yacht</option>
                    <option value="luxury">luxury</option>
                    <option value="fishing">fishing</option>
                    <option value="sailing">sailing</option>
                </select>
            </div>
            <div class="col-lg-4 col-sm-6 mt-3">
                <select class="form-select px-2 py-3 w-100 filters" id="seats">
                    <option value="0">choose number of seats</option>
                    <option value="1">8-12 seats</option>
                    <option value="2">12-16 seats</option>
                    <option value="3">16+ seats</option>
                </select>
            </div>
            <div class="col-lg-4 col-sm-6 mt-3">
                <select class="form-select px-2 py-3 w-100 filters" id="sort">
                    <option value="asc" selected>Price: Low to High</option>
                    <option value="desc">Price: High to Low</option>
                    <option value="nameAsc">Name ASC</option>
                    <option value="nameDesc">Name DESC</option>
                </select>
            </div>
            <div class="mt-3">
                <button id="resetFilters" class="btn btn-outline-light px-4 py-2 mb-3">Reset filters</button>
            </div>
        </div>
        
    </div>

    <!--boats-->
    <div id="boatsPackages" ></div>
   
    <p id="noResults" class="d-none text-center my-3">
        Ne postoje camci za izabrane kriterijume.
    </p>

    <div class="d-flex justify-content-center pb-5 mt-2">
        <button id="loadMoreBtn" class="btn btn-join px-4 py-2">
            Load More
        </button>
    </div>


    <!-- footer  -->
    <div id="footerContainer"></div>
      <!-- bootstrap js  -->
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
      <!-- moj JS -->
      <script src="assets/js/main.js"></script>
      <script src="assets/js/boats.js"></script>

  </body>
</html>
